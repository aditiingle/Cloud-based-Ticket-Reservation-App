name: Java CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      MONGO_DATABASE: ${{ secrets.MONGO_DATABASE }}
      MONGO_USER: ${{ secrets.MONGO_USER }}
      MONGO_PASSWORD: ${{ secrets.MONGO_PASSWORD }}
      MONGO_CLUSTER: ${{ secrets.MONGO_CLUSTER }}
      MONGODB_URI: ${{ secrets.MONGODB_URI }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Maven packages
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build and run tests
        run: mvn clean verify

      - name: Display test results
        if: always()
        run: cat target/surefire-reports/*.txt || true

      - name: Print Surefire reports
        if: always()
        run: |
          find target/surefire-reports -type f -maxdepth 1 | sort
          for f in target/surefire-reports/*.txt; do
            echo "===== $f ====="
            cat "$f"
            echo
          done
      - name: Print XML report snippets
        if: always()
        run: |
          grep -R "Caused by\|Exception\|Failed to load ApplicationContext" target/surefire-reports || true